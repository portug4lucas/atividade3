<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Usuários</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <div class="card">
    <h1>Cadastro de Usuários</h1>

    <input type="text"  id="input-nome"  placeholder="Digite o nome do usuário" />
    <input type="email" id="input-email" placeholder="Digite o e-mail" />

    <div class="btn-group">
      <button id="btn-salvar"  onclick="salvarUsuario()">Salvar</button>
      <button id="btn-limpar"  onclick="limparFormulario()">Limpar</button>
    </div>

    <p id="mensagem"></p>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela-usuarios"></tbody>
    </table>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
